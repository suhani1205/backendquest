<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BackendQuest — Level Up to Senior</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0E14; --panel:#131826; --panel2:#1A2133; --line:#232C42;
  --ink:#E8ECF4; --dim:#8B95AC; --violet:#8B6CFF; --violet-deep:#6A4DE8;
  --mint:#00E5A0; --gold:#FFC94D; --red:#FF5C7A; --cyan:#4DD8FF;
  --grad:linear-gradient(135deg,#8B6CFF,#4DD8FF 55%,#00E5A0);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-size:16px;line-height:1.65;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:
  radial-gradient(600px 300px at 15% -5%, rgba(139,108,255,.14), transparent),
  radial-gradient(500px 280px at 90% 0%, rgba(0,229,160,.08), transparent);pointer-events:none}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
button{font-family:inherit;cursor:pointer}

/* top bar */
.topbar{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:12px;padding:12px 18px;background:rgba(11,14,20,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.01em;cursor:pointer;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap}
.spacer{flex:1}
.pill{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:99px;padding:5px 12px;font-family:'JetBrains Mono',monospace;font-size:12.5px;white-space:nowrap}
.pill .xpnum{color:var(--gold);font-weight:600}
.pill.lvl{color:var(--violet)}
.pill.streak{color:#FF9A4D}

/* XP toast */
#toastZone{position:fixed;top:64px;right:16px;z-index:100;display:flex;flex-direction:column;gap:8px;align-items:flex-end;pointer-events:none}
.toast{background:var(--panel2);border:1px solid var(--violet);border-radius:12px;padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold);box-shadow:0 4px 24px rgba(139,108,255,.35);animation:toastIn .3s ease, toastOut .4s ease 1.8s forwards}
.toast.levelup{border-color:var(--gold);color:var(--ink);font-size:14px}
@keyframes toastIn{from{transform:translateY(-10px);opacity:0}to{transform:none;opacity:1}}
@keyframes toastOut{to{transform:translateY(-6px);opacity:0}}

main{max-width:900px;margin:0 auto;padding:26px 18px 90px;position:relative}

/* home */
.hero{margin:14px 0 26px}
.hero h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(30px,5.5vw,44px);letter-spacing:-.02em;line-height:1.1}
.hero h1 span{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{color:var(--dim);margin-top:8px;max-width:560px}
.lvlbar{margin-top:18px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 16px}
.lvlbar .row{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim)}
.lvlbar .row b{color:var(--ink)}
.bar{height:10px;background:#0E1220;border-radius:99px;margin-top:8px;overflow:hidden}
.bar>i{display:block;height:100%;width:0%;background:var(--grad);border-radius:99px;transition:width .6s cubic-bezier(.22,1,.36,1)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-top:8px}
.tcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;text-align:left;color:var(--ink);transition:transform .15s,border-color .15s;position:relative;overflow:hidden}
.tcard:hover{transform:translateY(-3px);border-color:var(--violet)}
.tcard .icon{font-size:26px}
.tcard h3{font-family:'Space Grotesk',sans-serif;font-size:18px;margin:8px 0 4px}
.tcard p{font-size:13.5px;color:var(--dim);min-height:40px}
.tcard .meta{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--dim)}
.tcard .done{color:var(--mint)}
.tcard .minibar{height:6px;background:#0E1220;border-radius:99px;margin-top:8px;overflow:hidden}
.tcard .minibar>i{display:block;height:100%;background:var(--grad)}
.revcard{border-color:rgba(255,201,77,.4)}
.revcard:hover{border-color:var(--gold)}
.sec{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin:26px 0 12px;display:flex;gap:10px;align-items:center}
.sec::after{content:"";flex:1;height:1px;background:var(--line)}

/* track view */
.back{background:none;border:none;color:var(--dim);font-size:14px;padding:4px 0;margin-bottom:10px}
.back:hover{color:var(--ink)}
.track-head{display:flex;gap:14px;align-items:center;margin-bottom:6px}
.track-head .icon{font-size:34px}
.track-head h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(24px,4.5vw,34px);letter-spacing:-.01em}
.track-desc{color:var(--dim);margin-bottom:20px;max-width:640px}
.lesson-row{width:100%;display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;color:var(--ink);text-align:left;transition:border-color .15s,transform .12s}
.lesson-row:hover{border-color:var(--violet);transform:translateX(3px)}
.lesson-row .num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);width:24px;flex:0 0 auto}
.lesson-row .lt{font-weight:600;flex:1}
.lesson-row .st{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);flex:0 0 auto}
.lesson-row.done .st{color:var(--mint)}
.bossbtn{width:100%;margin-top:14px;background:linear-gradient(135deg,rgba(139,108,255,.18),rgba(255,92,122,.14));border:1px solid var(--violet);border-radius:16px;padding:18px;color:var(--ink);font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;transition:transform .15s,box-shadow .15s}
.bossbtn:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(139,108,255,.3)}
.bossbtn small{display:block;font-family:'JetBrains Mono',monospace;font-weight:400;font-size:11.5px;color:var(--dim);margin-top:4px}
.bossbtn.defeated{border-color:var(--mint)}

/* lesson view */
article{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px 20px;margin-top:6px}
article h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(21px,4vw,27px);margin-bottom:4px;letter-spacing:-.01em}
article .crumb{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--violet);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
article p{margin:13px 0;color:#C6CEDD}
article strong{color:var(--ink)}
article ul{margin:10px 0 13px 20px;color:#C6CEDD}
article li{margin:7px 0}
.analogy{background:rgba(139,108,255,.1);border:1px solid rgba(139,108,255,.35);border-radius:12px;padding:12px 15px;margin:14px 0;font-size:15px}
.analogy b{color:var(--violet)}
.trap{background:rgba(255,92,122,.08);border-left:3px solid var(--red);border-radius:0 10px 10px 0;padding:11px 14px;margin:14px 0;font-size:15px;color:#C6CEDD}
.trap b{color:var(--red)}
.win{background:rgba(0,229,160,.07);border-left:3px solid var(--mint);border-radius:0 10px 10px 0;padding:11px 14px;margin:14px 0;font-size:15px;color:#C6CEDD}
.win b{color:var(--mint)}
pre{background:#0A0D15;border:1px solid var(--line);color:#DCE4F5;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.6;padding:14px;border-radius:12px;overflow-x:auto;margin:13px 0}
code.inline{font-family:'JetBrains Mono',monospace;font-size:.87em;background:#0A0D15;border:1px solid var(--line);border-radius:6px;padding:1px 6px;color:var(--cyan)}

/* quick check + quiz shared */
.check{margin-top:22px;background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:18px}
.check .tag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.check .q{font-weight:700;font-size:16.5px;margin-bottom:12px}
.opt{display:block;width:100%;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:8px 0;color:var(--ink);font-size:15px;transition:transform .1s,border-color .1s}
.opt:hover:not(:disabled){border-color:var(--violet);transform:translateX(3px)}
.opt:disabled{cursor:default}
.opt.correct{border-color:var(--mint);background:rgba(0,229,160,.1);font-weight:600}
.opt.wrong{border-color:var(--red);background:rgba(255,92,122,.09)}
.explain{display:none;margin-top:12px;background:rgba(77,216,255,.07);border:1px solid rgba(77,216,255,.25);border-radius:12px;padding:12px 14px;font-size:14.5px;color:#C6CEDD}
.explain.shown{display:block}
.navrow{display:flex;justify-content:space-between;gap:10px;margin-top:16px}
.btn{background:var(--violet);border:none;border-radius:12px;padding:11px 22px;color:#fff;font-weight:700;font-size:14.5px;transition:transform .12s,box-shadow .12s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,108,255,.4)}
.btn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--dim)}
.btn.mint{background:var(--mint);color:#04120C}
.btn:disabled{opacity:.4;transform:none;box-shadow:none;cursor:default}

/* boss battle */
.boss-arena{background:var(--panel);border:1px solid var(--violet);border-radius:18px;padding:22px 20px;box-shadow:0 0 40px rgba(139,108,255,.15)}
.boss-top{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.boss-emoji{font-size:40px;filter:drop-shadow(0 0 12px rgba(255,92,122,.5))}
.boss-emoji.shake{animation:shake .35s}
@keyframes shake{25%{transform:translateX(-6px) rotate(-6deg)}50%{transform:translateX(5px)}75%{transform:translateX(-4px) rotate(5deg)}}
.boss-name{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700}
.hp{height:14px;background:#0E1220;border:1px solid var(--line);border-radius:99px;overflow:hidden;margin:8px 0 4px}
.hp>i{display:block;height:100%;width:100%;background:linear-gradient(90deg,var(--red),#FF9A4D);transition:width .5s cubic-bezier(.22,1,.36,1)}
.hp-label{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--dim);margin-bottom:14px}
.victory{text-align:center;padding:24px 0}
.victory .big{font-size:52px}
.victory h3{font-family:'Space Grotesk',sans-serif;font-size:26px;margin:8px 0}
.victory p{color:var(--dim)}

/* flashcards */
.flash-stage{perspective:1200px;margin-top:10px}
.fcard{position:relative;width:100%;min-height:240px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);cursor:pointer}
.fcard.flip{transform:rotateY(180deg)}
.fface{position:absolute;inset:0;backface-visibility:hidden;background:var(--panel);border:1px solid var(--violet);border-radius:20px;padding:24px;display:flex;flex-direction:column;justify-content:center;box-shadow:0 8px 40px rgba(0,0,0,.4)}
.fface.back{transform:rotateY(180deg);border-color:var(--mint)}
.fface .flabel{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.fface .ftext{font-size:16.5px;line-height:1.6}
.fface.front .ftext{font-weight:700;font-size:19px}
.flash-meta{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);margin:14px 2px 10px}
.flash-actions{display:flex;gap:10px;margin-top:12px}
.flash-actions .btn{flex:1}
.fdone{text-align:center;padding:40px 0}
.fdone .big{font-size:48px}

/* confetti */
.confetti{position:fixed;font-size:22px;z-index:200;pointer-events:none;animation:fall 1.6s ease-in forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.2}}
footer{max-width:900px;margin:0 auto;padding:0 18px 40px;color:#4A5468;font-size:12.5px;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo" onclick="go('home')">⚡ BackendQuest</div>
  <div class="spacer"></div>
  <div class="pill streak">🔥 <span id="streakN">1</span></div>
  <div class="pill"><span class="xpnum" id="xpN">0</span> XP</div>
  <div class="pill lvl" id="lvlPill">Intern</div>
</div>
<div id="toastZone"></div>
<main id="main"></main>
<footer>⚡ BackendQuest · progress saves in this browser · built for one goal: senior-level depth that sticks</footer>

<script>
/* ============ GAME SYSTEM ============ */
const LEVELS=[[0,"Intern"],[100,"Junior Dev"],[250,"SDE-1"],[450,"SDE-2"],[700,"Senior Engineer"],[1000,"Staff Engineer"]];
let S={xp:0,streak:1,lastDay:null,lessons:{},checks:{},boss:{},flash:{}};
function safeSave(){try{localStorage.setItem('bq_state',JSON.stringify(S))}catch(e){}}
function safeLoad(){try{const r=localStorage.getItem('bq_state');if(r)S={...S,...JSON.parse(r)}}catch(e){}}
safeLoad();
(function streak(){
  const today=new Date().toDateString();
  if(S.lastDay!==today){
    const y=new Date(Date.now()-864e5).toDateString();
    S.streak=(S.lastDay===y)?(S.streak+1):1;
    S.lastDay=today;safeSave();
  }
})();
function levelOf(xp){let l=LEVELS[0];for(const L of LEVELS){if(xp>=L[0])l=L}return l}
function nextLevel(xp){for(const L of LEVELS){if(xp<L[0])return L}return null}
function addXP(n,label){
  const before=levelOf(S.xp)[1];
  S.xp+=n;safeSave();
  toast('+'+n+' XP'+(label?' · '+label:''));
  const after=levelOf(S.xp)[1];
  if(after!==before){setTimeout(()=>{toast('🎉 LEVEL UP → '+after,'levelup');burst()},400)}
  paintHud();
}
function toast(txt,cls){
  const t=document.createElement('div');t.className='toast '+(cls||'');t.textContent=txt;
  document.getElementById('toastZone').appendChild(t);
  setTimeout(()=>t.remove(),2400);
}
function burst(){
  const em=['🎉','⚡','✨','🏆','💜'];
  for(let i=0;i<18;i++){
    const c=document.createElement('div');c.className='confetti';
    c.textContent=em[i%em.length];
    c.style.left=(5+Math.random()*90)+'vw';c.style.top='-30px';
    c.style.animationDelay=(Math.random()*.4)+'s';
    document.body.appendChild(c);setTimeout(()=>c.remove(),2200);
  }
}
function paintHud(){
  document.getElementById('xpN').textContent=S.xp;
  document.getElementById('lvlPill').textContent=levelOf(S.xp)[1];
  document.getElementById('streakN').textContent=S.streak;
}

/* ============ CONTENT ============ */
const TR=[
/* ---------------- JAVA ---------------- */
{id:"java",icon:"☕",name:"Java Internals",desc:"Memory, HashMap, threads — the internals that separate 'writes Java' from 'understands Java'.",
boss:{name:"The NullPointer Overlord",emoji:"👾"},
lessons:[
{t:"JVM memory & garbage collection",h:`<div class="analogy"><b>The house:</b> your program's memory is a house. New objects land in the entryway (<strong>Eden</strong>). Things you keep using move to a shelf (<strong>Survivor</strong>). Long-term keepers go to permanent storage (<strong>Old Generation</strong>). The garbage collector is the cleaner who throws out everything nobody's holding onto.</div>
<p>The flow: new objects are born in Eden. When it fills, a fast cleanup ("<strong>minor GC</strong>") runs — dead objects vanish, survivors move to a Survivor space and their "age" ticks up. Survive ~15 cleanups and you're promoted to the Old Generation, which is cleaned rarely because cleaning it is slow and disruptive. Class metadata lives separately in <strong>Metaspace</strong>.</p>
<p>The catch: cleanups sometimes <strong>pause your entire program</strong>. This is where GC choice matters: <strong>G1</strong> (the default since Java 9) cleans the heap in small regions to hit a pause-time goal; <strong>ZGC</strong> achieves sub-millisecond pauses even on 100GB+ heaps.</p>
<div class="trap"><b>The interview scenario:</b> "our p99 latency spikes 200ms every ~40 seconds." Expected answer: GC pauses — check the GC logs before touching code. Mention <code class="inline">-Xms=-Xmx</code> (avoid heap resizing) and pause-time goals, and you sound like you've debugged this in production.</div>
<div class="win"><b>Say it like a senior:</b> "Latency spikes with a regular period smell like GC. I'd confirm in GC logs, then look at allocation rate before tuning anything."</div>`,
check:{q:"An object gets promoted to the Old Generation when…",o:["It's larger than 1MB","It survives enough minor GC cycles","It's declared static","Eden overflows"],c:1,e:"Each minor GC it survives bumps its age; past the tenuring threshold (~15) the JVM decides it's long-lived and promotes it so it stops being scanned constantly."}},
{t:"HashMap internals (the locker wall)",h:`<div class="analogy"><b>The locker wall:</b> <code class="inline">hashCode()</code> converts your key into a locker number, so lookup is instant — that's the O(1). Everything else about HashMap is handling two problems: shared lockers and crowded walls.</div>
<p><strong>Problem 1 — collisions.</strong> Two keys, same locker: items form a chain inside. If a chain passes <strong>8 items</strong> (and the table has ≥ 64 lockers), Java converts it into a red-black tree — searching drops from O(n) to O(log n).</p>
<p><strong>Problem 2 — crowding.</strong> At 75% full (<strong>load factor 0.75</strong>), Java doubles the lockers and redistributes every entry.</p>
<p><strong>Why it explodes with threads:</strong> two threads writing simultaneously can overwrite each other's chains — lost updates (and in ancient Java, resize could even create infinite loops). <strong>ConcurrentHashMap</strong> fixes it elegantly: it locks only the single bucket being written (synchronized on the chain's head node) and reads take <em>no lock at all</em>. One big lock (Collections.synchronizedMap) vs many tiny ones — that's why CHM scales with cores.</p>
<div class="trap"><b>The gold-plated trap:</b> mutate a key AFTER putting it in the map, and its hashCode changes — the map now looks in the wrong locker and your entry is unreachable. This is why good keys are immutable, and why String (cached hashCode, can't change) is the perfect key.</div>`,
check:{q:"A bucket's chain becomes a red-black tree when it reaches…",o:["4 entries","8 entries (table ≥ 64)","16 entries","Load factor 0.75"],c:1,e:"8 entries in one bucket triggers treeification → O(log n) worst case. Load factor 0.75 controls when the whole map resizes — a separate mechanism people mix up."}},
{t:"Concurrency: volatile, locks & CompletableFuture",h:`<p>Three tools, three completely different jobs:</p>
<ul>
<li><strong>volatile</strong> — a "no private copies" sign on a variable: every thread always sees the latest value. But it does NOT make <code class="inline">count++</code> safe — that's secretly three steps (read, add, write) and threads can interleave them. <em>Visibility, not atomicity.</em> For counters: <code class="inline">AtomicInteger</code>.</li>
<li><strong>synchronized / ReentrantLock</strong> — one thread in the room at a time. The Lock version adds power tools: <code class="inline">tryLock()</code> (try the door, walk away), timed waits, fairness, multiple wait conditions.</li>
<li><strong>CompletableFuture</strong> — compose background work: <code class="inline">thenCompose</code> chains dependent steps (B needs A's result); <code class="inline">thenCombine</code> merges independent ones (A and B in parallel, then join).</li>
</ul>
<pre>CompletableFuture&lt;User&gt; user = fetchUserAsync(id);
CompletableFuture&lt;List&lt;Order&gt;&gt; orders = fetchOrdersAsync(id);
user.thenCombine(orders, (u, o) -> buildProfile(u, o));</pre>
<div class="trap"><b>Trap:</b> by default CompletableFuture runs on the shared ForkJoinPool — put blocking I/O there and you starve every other async task in the JVM. Always pass your own executor for blocking work.</div>`,
check:{q:"volatile guarantees…",o:["count++ becomes thread-safe","All threads see the latest written value — nothing more","Only one thread can write","Automatic locking"],c:1,e:"Visibility and ordering only. count++ is read-modify-write; two threads can interleave and lose an update. AtomicInteger or a lock for counting."}},
{t:"Virtual threads — the Java 21 headline",h:`<p><strong>The old problem:</strong> platform threads are heavy — ~1MB of stack each, managed by the OS. A few thousand is the practical ceiling. So when a request thread just <em>waits</em> on a database or API call, you're wasting a scarce resource — which forced the industry into complex reactive programming to avoid blocking.</p>
<p><strong>The fix:</strong> virtual threads are nearly-free threads managed by the JVM itself. When one blocks on I/O, the JVM <em>parks</em> it and lends the real ("carrier") thread underneath to another virtual thread. Result: millions of concurrent blocking calls, while your code stays plain, readable, thread-per-request style.</p>
<pre>// One line in Spring Boot 3.2+:
spring.threads.virtual.enabled=true</pre>
<div class="trap"><b>Pinning:</b> blocking inside a <code class="inline">synchronized</code> block pins the virtual thread to its carrier (defeating the whole point). Hot paths that block should use ReentrantLock instead. Dropping the word "pinning" in an interview signals genuine currency.</div>
<div class="win"><b>Say it like a senior:</b> "Virtual threads give us reactive-level concurrency without reactive-level complexity — the trade-off that killed thread-per-request just disappeared."</div>`,
check:{q:"When a virtual thread blocks on I/O…",o:["The OS thread underneath blocks too","The JVM parks it and reuses the carrier thread for other work","It crashes","It spins, burning CPU"],c:1,e:"That's the entire trick: blocking becomes cheap because the expensive OS thread underneath is immediately lent to someone else."}},
{t:"Pass-by-value & why String can't change",h:`<div class="analogy"><b>The photocopied address:</b> you hand a friend a photocopy of your home address. They can visit and rearrange your furniture (mutate the object) — but scribbling a new address on their copy changes nothing for you. Java is <strong>always pass-by-value</strong>; for objects, the value copied is the reference.</div>
<pre>void update(Book b) {
    b.markFinished();        // visible to the caller (same house)
    b = new Book("Other");   // invisible — only MY copy now points elsewhere
}</pre>
<p><strong>Why String is immutable</strong> — the four reasons interviewers want:</p>
<ul>
<li><strong>Security</strong> — a file path can't be swapped after validation passes</li>
<li><strong>Free thread-safety</strong> — nothing to protect if nothing can change</li>
<li><strong>Cached hashCode</strong> — computed once, making String the ideal HashMap key</li>
<li><strong>Safe pooling</strong> — literals can be shared only because they can't mutate</li>
</ul>
<p>Recipe for your own immutable class (a favorite quick question): final class, final fields, no setters, defensive copies of any mutable field you receive or return.</p>`,
check:{q:"Inside a method you reassign the parameter to a new object. The caller…",o:["Sees the new object","Still holds the original — the reference was copied","Gets null","Compile error"],c:1,e:"The method received a photocopy of the address. Reassigning the copy repoints IT; the caller's variable is untouched. Mutating through the reference, though, IS visible."}}],
bossQ:[
{q:"Your service freezes ~200ms every 40 seconds. First diagnostic move?",o:["Add more CPU","Check GC logs — periodic pauses smell like garbage collection","Restart the JVM","Increase thread pool size"],c:1,e:"Regular-interval latency spikes are the classic GC signature. Logs first, tuning second, code changes last."},
{q:"ConcurrentHashMap beats Collections.synchronizedMap because…",o:["It uses no locks at all","It locks per-bucket and reads lock-free, instead of one global lock","It's immutable","It preallocates memory"],c:1,e:"synchronizedMap = one big lock, every operation queues. CHM = tiny per-bucket locks + lock-free reads = scales with cores."},
{q:"You mutate an object AFTER using it as a HashMap key. Result?",o:["Nothing changes","The entry becomes unreachable — lookup checks the wrong bucket","The map re-sorts","An exception is thrown"],c:1,e:"Its hashCode changed, so get() computes a different bucket. The entry still exists but you can't find it. Immutable keys prevent this whole class of bug."},
{q:"A virtual thread blocks inside a synchronized block. This causes…",o:["A deadlock always","Pinning — the carrier thread is stuck too, defeating virtual threads","Nothing, it's fine","OutOfMemoryError"],c:1,e:"Blocking inside synchronized pins the virtual thread to its carrier. Hot blocking paths should use ReentrantLock. 'Pinning' is the keyword that impresses."},
{q:"Why is String the ideal HashMap key?",o:["It's the shortest type","Immutable + cached hashCode = fast and can never 'move buckets'","It auto-interns","Strings compress well"],c:1,e:"hashCode computed once and cached (fast repeated lookups), and immutability guarantees the bucket never silently changes."}]},

/* ---------------- SPRING BOOT ---------------- */
{id:"spring",icon:"🌱",name:"Spring Boot",desc:"Auto-configuration demystified, the request journey, and the @Transactional traps everyone fails once.",
boss:{name:"The Proxy Phantom",emoji:"🥷"},
lessons:[
{t:"Auto-configuration: the self-furnishing hotel room",h:`<div class="analogy"><b>The hotel room:</b> you arrive with a database driver in your luggage → a connection pool appears, configured. You brought your own bed → the hotel politely doesn't add a second one. That's auto-configuration.</div>
<p><code class="inline">@SpringBootApplication</code> bundles three annotations: component scanning (find your classes), configuration, and <strong>@EnableAutoConfiguration</strong>. The starter jars ship auto-config classes, each guarded by conditions:</p>
<ul>
<li><code class="inline">@ConditionalOnClass(DataSource.class)</code> — "only if that library is on the classpath"</li>
<li><code class="inline">@ConditionalOnMissingBean</code> — "only if the developer didn't define their own"</li>
</ul>
<p>So the interview one-liner for "what happens at startup?": <strong>scan the classpath → evaluate conditions → register bean definitions → inject dependencies → start embedded Tomcat.</strong></p>
<p>And the second half of that hotel-room rule is the extension model: define your own bean of the same type, and Boot's default silently steps aside. You're never fighting the framework — you're overriding its defaults.</p>`,
check:{q:"@ConditionalOnMissingBean exists so that…",o:["Startup fails fast on missing beans","Boot's default backs off the moment you define your own bean","Beans load lazily","Tests can skip beans"],c:1,e:"It's the politeness mechanism of auto-configuration: sensible defaults that always yield to your explicit choices."}},
{t:"The request journey (say this fluently)",h:`<p>Every interviewer eventually asks "walk me through a request." The journey:</p>
<ul>
<li><strong>1.</strong> Tomcat accepts the connection, hands it to the <strong>DispatcherServlet</strong> — the single front door of every Spring MVC app.</li>
<li><strong>2.</strong> <strong>HandlerMapping</strong> matches URL + verb to your controller method.</li>
<li><strong>3.</strong> Argument resolvers fire: <strong>Jackson</strong> deserializes the JSON body into your object (<code class="inline">@RequestBody</code>), <code class="inline">@PathVariable</code> grabs URL pieces, validation runs on <code class="inline">@Valid</code>.</li>
<li><strong>4.</strong> Your method executes.</li>
<li><strong>5.</strong> The return value flows back through an <strong>HttpMessageConverter</strong> — object becomes JSON.</li>
<li><strong>6.</strong> <strong>Filters and interceptors</strong> wrap the whole journey (auth, logging, CORS).</li>
<li><strong>7.</strong> Any exception routes to <strong>@ControllerAdvice</strong> for a consistent error shape.</li>
</ul>
<div class="win"><b>Why this matters beyond trivia:</b> every debugging session lives on this map. 401 before your code runs? Filter. JSON field silently null? Step 3, Jackson naming. Error body inconsistent? Step 7 missing.</div>`,
check:{q:"The single front door that receives every request in Spring MVC is…",o:["The controller","DispatcherServlet","Jackson","The bean factory"],c:1,e:"DispatcherServlet is the front controller: it finds the handler, orchestrates argument resolution, and routes the response back out."}},
{t:"Beans, scopes & the lifecycle",h:`<p>A <strong>bean</strong> is an object Spring creates and manages. Lifecycle: instantiate → inject dependencies → <code class="inline">@PostConstruct</code> → <strong>possibly wrapped in a proxy</strong> (this is where @Transactional and @Cacheable get their powers) → serves → <code class="inline">@PreDestroy</code>.</p>
<p><strong>Scopes</strong> answer "how many copies exist?"</p>
<ul>
<li><strong>singleton</strong> (default) — ONE per Spring container. Note: per container, not per JVM — a subtle interview distinction.</li>
<li><strong>prototype</strong> — a fresh instance every time it's requested.</li>
<li><strong>request / session</strong> — web-scoped.</li>
</ul>
<div class="trap"><b>The frozen prototype trap:</b> inject a prototype into a singleton and you get ONE prototype, forever — injection happened once, at startup. Need a fresh one per use? Ask Spring each time: <code class="inline">ObjectProvider&lt;Thing&gt;.getObject()</code>.</div>
<p>Also worth 10 seconds: <code class="inline">@Component</code> (class-level, for classes you own, found by scanning) vs <code class="inline">@Bean</code> (method inside @Configuration, for third-party classes or construction that needs logic).</p>`,
check:{q:"You inject a prototype-scoped bean into a singleton. You get…",o:["A fresh instance per call","One frozen instance forever — injection happened once at startup","A compile error","Two singletons"],c:1,e:"The singleton was wired once, so it holds one prototype for life. ObjectProvider (or @Lookup) fetches fresh instances on demand."}},
{t:"@Transactional: the guard at the gate",h:`<div class="analogy"><b>The guard:</b> the transaction isn't inside your method — it's a security guard at the building's front gate (the <strong>proxy</strong> Spring wrapped around your bean). External callers pass the guard; he opens the transaction going in, commits or rolls back coming out.</div>
<p>The traps, in order of interview frequency:</p>
<ul>
<li><strong>Self-invocation silently does nothing.</strong> <code class="inline">this.otherMethod()</code> uses the internal corridor — no guard, no transaction, no warning. Fix: move the method to another bean.</li>
<li><strong>Rollback asymmetry.</strong> By default only <em>runtime</em> exceptions roll back; checked exceptions COMMIT unless you set <code class="inline">rollbackFor = Exception.class</code>.</li>
<li><strong>Private methods</strong> can't be transactional — the proxy can't override them.</li>
<li><strong><code class="inline">REQUIRES_NEW</code></strong> suspends the current transaction and runs a separate one — the pattern for audit logs that must survive a rollback.</li>
</ul>
<div class="trap"><b>The production killer:</b> calling a slow external API inside a transaction holds a database connection hostage the whole call. Under load the pool empties and the entire service stalls. Rule: transactions stay short, and never contain network calls.</div>`,
check:{q:"Why does this.transactionalMethod() from the same class skip the transaction?",o:["Transactions need static methods","The call bypasses the proxy 'guard' around the bean","Spring caches the result","It doesn't — trick question"],c:1,e:"The transaction lives in the proxy wrapper. Internal calls take the corridor, never passing the gate. Extract to another bean so calls cross the proxy."}},
{t:"Production polish: Actuator, config, pools",h:`<p>Three things that separate tutorial apps from production apps:</p>
<p><strong>1. Actuator.</strong> Add one dependency, get <code class="inline">/actuator/health</code> with separate <strong>liveness</strong> ("am I alive?") and <strong>readiness</strong> ("can I take traffic?") groups — purpose-built for Kubernetes probes — plus <code class="inline">/metrics</code> feeding Prometheus via Micrometer.</p>
<p><strong>2. Config discipline.</strong> Group settings into <code class="inline">@ConfigurationProperties</code> classes (typed, validated, IDE-completable) rather than scattering <code class="inline">@Value</code>. Precedence to memorize: CLI args &gt; environment variables &gt; application-{profile}.yml &gt; application.yml.</p>
<p><strong>3. Pool sanity.</strong> HikariCP is the default connection pool. Correct size ≈ <strong>CPU cores × 2</strong> — about 10, not 100. An oversized pool doesn't speed up the database; it moves the traffic jam inside it, where it's harder to see.</p>
<div class="win"><b>Say it like a senior:</b> "We sized Hikari at cores×2 and watched p99 improve — the big pool was just queueing contention inside Postgres."</div>`,
check:{q:"A sensible HikariCP pool size for a 4-core service:",o:["100","50","~10","1"],c:2,e:"cores × 2 ≈ 10. More connections past that point just makes queries fight each other inside the database."}}],
bossQ:[
{q:"POST /books with an empty title returns a stack trace. The professional fix is…",o:["try/catch in the controller","@Valid on the request + @RestControllerAdvice turning violations into clean 400s","Client-side validation only","Log and return 200"],c:1,e:"Declare rules on the DTO, enforce with @Valid, centralize the error shape in one advice class. Consistent 400s, zero leaked internals."},
{q:"A checked exception is thrown inside @Transactional (default config). The transaction…",o:["Rolls back","COMMITS — only runtime exceptions roll back by default","Retries","Deadlocks"],c:1,e:"The rollback asymmetry: RuntimeException rolls back, checked commits. rollbackFor=Exception.class changes it. Everyone gets burned once."},
{q:"Your API is slow because a downstream service hangs. First line of defense?",o:["Bigger thread pool","Timeouts on connect AND read — always, sized to your latency budget","Retry immediately in a loop","Cache everything"],c:1,e:"Timeouts first, then circuit breaker, bulkheads, fallbacks. Retries only for idempotent calls with backoff+jitter. Without a timeout, every other pattern is pointless."},
{q:"@Component vs @Bean:",o:["Identical","@Component for classes you own (scanned); @Bean for third-party classes or construction logic","@Bean is deprecated","@Component is only for controllers"],c:1,e:"Can't annotate a library's class — construct it in a @Bean method inside @Configuration instead."},
{q:"External API call placed inside a @Transactional method. The production risk:",o:["None","DB connections held hostage during slow calls → pool exhaustion → total stall","Faster responses","Double commits"],c:1,e:"The transaction pins a connection for its whole duration. Slow network call × concurrent requests = empty pool = everything waits."}]},

/* ---------------- MICROSERVICES ---------------- */
{id:"micro",icon:"🧩",name:"Microservices",desc:"Sagas, outbox, idempotency, circuit breakers — the trade-off conversations that decide senior offers.",
boss:{name:"The Distributed Monolith",emoji:"🐙"},
lessons:[
{t:"When to split (and the courage not to)",h:`<div class="analogy"><b>The restaurant:</b> you separate the kitchen, the bar, and billing because different teams run them at different speeds. You do NOT give every waiter a personal kitchen. Split along <strong>business capabilities</strong> (orders, payments, notifications) — never technical layers.</div>
<p>The iron rule: <strong>each service owns its database.</strong> The moment two services write the same tables, you've built a <strong>distributed monolith</strong> — coupled schemas and deployments, PLUS network failures. All of the cost, none of the benefit.</p>
<div class="win"><b>The senior signal is knowing when NOT to split:</b> small team, blurry domain boundaries, early product → a well-modularized monolith is faster, saner, and cheaper to operate. Split when teams block each other or when parts need to scale very differently. Saying this in an interview earns trust, not doubt — it shows you've paid the operational bill of microservices, not just read about them.</div>
<p>The decomposition tool with a name worth dropping: <strong>bounded contexts</strong> from Domain-Driven Design — "Order" means something different to Sales vs Shipping, and that semantic boundary is usually your service boundary.</p>`,
check:{q:"Two services writing to the same database tables creates…",o:["Better consistency","A distributed monolith — coupled schemas plus network failures","Event sourcing","Higher availability"],c:1,e:"Their schemas and deploys are chained together, with network failure modes added on top. Data ownership is the entire point of the split."}},
{t:"Sync vs async: the phone call and the message",h:`<div class="analogy"><b>Phone call vs WhatsApp:</b> a REST/gRPC call is a phone call — instant answer, but if the other side doesn't pick up, you're stuck. A Kafka event is a message — send it and move on; they handle it when they can.</div>
<p><strong>Sync costs:</strong> temporal coupling (if Payments is down, Orders fails too) and latency stacking (a chain of 5 calls sums 5 latencies, and tail latency amplifies through fan-out).</p>
<p><strong>Async costs:</strong> <strong>eventual consistency</strong> (things become correct shortly, not instantly), harder debugging, and duplicate handling (next lessons).</p>
<p><strong>The rule of thumb worth memorizing verbatim:</strong> queries can be phone calls; <em>state changes that cross services should be messages.</em> A read failing fast is annoying; an order failing because the notification service is down is unacceptable.</p>`,
check:{q:"Best default for inter-service communication:",o:["Everything sync — simpler","Everything async — faster","Queries sync; cross-service state changes async","Shared database"],c:2,e:"Reads can tolerate temporal coupling. Writes that span services shouldn't die because a peer is down — publish events and reconcile."}},
{t:"Saga & Outbox: consistency without 2PC",h:`<p>An order spans three services and no single transaction covers them. Two-phase commit blocks and doesn't scale. Two patterns replace it:</p>
<p><strong>Saga</strong> — split the big action into local transactions, each with an "undo" (compensation): reserve stock → charge card → card fails → un-reserve stock. Two styles:</p>
<ul>
<li><strong>Choreography</strong> — services react to each other's events, no coordinator. Beautifully decoupled; great for 2-3 steps; but the overall flow becomes invisible.</li>
<li><strong>Orchestration</strong> — a coordinator commands each step and tracks state. Visible, debuggable, easier compensation; one more component. Rule: choreograph simple flows, orchestrate 4+ steps.</li>
</ul>
<p><strong>Outbox</strong> — kills the sneakier <em>dual-write problem</em>: "I committed to my DB but crashed before publishing the event." Fix: write the business row AND the event into the <strong>same local transaction</strong> (an outbox table); a relay (poller or CDC like Debezium) publishes from that table to Kafka. Both happen or neither does.</p>
<pre>BEGIN;
  UPDATE orders SET status='PLACED' WHERE id=42;
  INSERT INTO outbox(event_type, payload) VALUES('OrderPlaced', {...});
COMMIT;   -- atomically together; relay publishes afterward</pre>`,
check:{q:"The outbox pattern exists to solve…",o:["Slow queries","'DB committed but the event publish failed' — the dual-write problem","Schema migrations","Service discovery"],c:1,e:"One local transaction covers the row and the event; a relay publishes from the outbox table. Divergence becomes impossible."}},
{t:"Idempotency: surviving duplicates",h:`<p>Hard truth to open interviews with: <strong>exactly-once delivery does not exist</strong> over an unreliable network — a response can always get lost, forcing a retry. So we build <strong>effectively-once</strong>: at-least-once delivery + processing that's safe to repeat.</p>
<p><strong>The payment API pattern:</strong> the client sends an <code class="inline">Idempotency-Key</code> header. The server stores key → response (unique DB constraint). A duplicate arrives → return the stored response, charge nothing.</p>
<p><strong>The consumer pattern:</strong> every event carries an ID; a <code class="inline">processed_events</code> table with a primary-key constraint dedups:</p>
<pre>try {
    processedRepo.insert(event.id());   // duplicate → constraint violation
    doTheActualWork(event);
} catch (DataIntegrityViolationException dup) {
    // seen it — do nothing, that IS the feature
}</pre>
<div class="win"><b>The line that wins the room:</b> "Exactly-once delivery is impossible; exactly-once <em>processing</em> is an engineering choice. Here's how I make duplicates harmless…" — then describe the key + constraint.</div>`,
check:{q:"'Effectively once' processing means…",o:["Kafka guarantees no duplicates","At-least-once delivery + idempotent processing that makes duplicates harmless","Sending each message twice","Using gRPC"],c:1,e:"You can't prevent redelivery; you CAN make reprocessing a no-op via idempotency keys and unique constraints."}},
{t:"Resilience & observability",h:`<div class="analogy"><b>The fuse box:</b> a circuit breaker is the fuse in your house. Too many failures → it trips <strong>OPEN</strong> and calls fail instantly instead of hanging threads behind a dead dependency. After a cooldown → <strong>HALF-OPEN</strong>, a few probe requests. Success → <strong>CLOSED</strong> (normal). Failure → back to OPEN.</div>
<p>The full resilience stack, in the order you apply it: <strong>timeouts</strong> (always, both connect and read) → <strong>circuit breaker</strong> → <strong>bulkheads</strong> (a small thread pool per dependency so one bad neighbor can't starve everyone) → <strong>fallbacks</strong> (cached/degraded responses) → <strong>retries</strong> (only idempotent calls, exponential backoff + jitter so your fleet doesn't retry in sync). Plus <strong>timeout budgets</strong>: given 2s by your caller, you can't give a downstream 3s.</p>
<p><strong>Observability</strong> — three pillars: structured logs, metrics (rate / errors / duration), and <strong>distributed tracing</strong>: a trace ID stamped at the edge travels in headers (OpenTelemetry / W3C traceparent) through every service. A slow request becomes a waterfall chart — the long bar is your culprit. Without it, debugging is grepping six log streams and praying.</p>`,
check:{q:"A circuit breaker in HALF-OPEN state…",o:["Rejects everything","Lets a few probe requests test recovery","Doubles all timeouts","Restarts the service"],c:1,e:"Probes after the cooldown: success closes the circuit, failure re-opens. This is how it avoids hammering a still-recovering service."}}],
bossQ:[
{q:"Payment service must never double-charge despite retries. Your design:",o:["Hope retries don't happen","Idempotency-Key header + unique constraint + outbox for events + consumer dedup","Synchronous 2PC","Charge, then refund duplicates"],c:1,e:"The full effectively-once stack. Bonus points for opening with 'exactly-once delivery is impossible.'"},
{q:"Your saga has 6 steps with complex compensation. You choose…",o:["Choreography — fewer components","Orchestration — a coordinator that tracks state and drives compensation","2PC","One giant transaction"],c:1,e:"Past 3-4 steps, choreography's invisible flow becomes unmaintainable. An orchestrator makes state and rollback explicit."},
{q:"A slow request crosses 6 services. Fastest path to the culprit:",o:["Grep all six logs","Open the distributed trace and find the long span","Restart everything","Add more replicas"],c:1,e:"One trace ID, one waterfall, one long bar. Then drill into that service's logs filtered by the same ID."},
{q:"When is a modular monolith the RIGHT answer?",o:["Never — microservices always win","Small team, fuzzy boundaries, early product — split later when pain is real","Only for prototypes","When you lack Kubernetes"],c:1,e:"Microservices trade code complexity for operational complexity. Paying that bill before you must is a self-inflicted wound — and saying so is a senior signal."},
{q:"Your retry storm is DDoSing your own downstream. The fix:",o:["More retries","Exponential backoff + jitter, retries only on idempotent calls, breaker in front","Remove all retries","Bigger downstream"],c:1,e:"Jitter desynchronizes the fleet; backoff gives recovery room; the breaker stops the flood when the patient is clearly down."}]},

/* ---------------- KAFKA ---------------- */
{id:"kafka",icon:"📨",name:"Kafka",desc:"Checkout lanes, bookmarks, poison messages — event streaming from mental model to production scars.",
boss:{name:"The Rebalance Storm",emoji:"🌪️"},
lessons:[
{t:"Topics, partitions & consumer groups",h:`<div class="analogy"><b>The supermarket:</b> a topic is a supermarket; <strong>partitions are its checkout lanes</strong>. Within one lane, strict order. Across lanes, no promises. Want all of customer #123's events in order? Send them to the same lane every time — that's what a message <strong>key</strong> does: same key → same partition.</div>
<p>A <strong>consumer group</strong> is a team of cashiers splitting the lanes — each lane served by exactly one cashier in the team. Hard consequences:</p>
<ul>
<li>More consumers than partitions → the extras stand idle. <strong>Partitions cap your parallelism.</strong></li>
<li>You can add partitions but never remove them — and adding reshuffles the key→lane mapping.</li>
<li>Two different consumer <em>groups</em> each get ALL the data independently — that's how five teams read the same stream without interfering.</li>
</ul>
<div class="win"><b>The pushback that sounds senior:</b> asked for "global ordering across all messages"? Challenge it. Global order can't scale and is almost never a real requirement — per-entity order (via keys) almost always is.</div>`,
check:{q:"Kafka guarantees message order…",o:["Across the whole topic","Within one partition only","Per consumer group","Only with acks=all"],c:1,e:"One lane, one order. Same key → same partition preserves per-entity ordering while everything else parallelizes."}},
{t:"Delivery guarantees: acks & idempotence",h:`<p>How sure do you want to be that a sent message survives?</p>
<ul>
<li><code class="inline">acks=0</code> — throw it and walk away. Fastest, loses data.</li>
<li><code class="inline">acks=1</code> — the partition leader confirmed. But if that broker dies before replicating, the message dies with it.</li>
<li><code class="inline">acks=all</code> + <code class="inline">min.insync.replicas=2</code> — at least two brokers hold it before the ack. <strong>The durability setting.</strong></li>
</ul>
<p>With retries enabled, the default contract is <strong>at-least-once</strong>: nothing lost, duplicates possible. The <strong>idempotent producer</strong> (<code class="inline">enable.idempotence=true</code>) uses sequence numbers to dedupe its own retries per partition.</p>
<div class="trap"><b>The trick question:</b> "does Kafka support exactly-once?" Precisely: only within Kafka-to-Kafka pipelines (transactions + read_committed consumers). Kafka-to-your-database is always at-least-once — the exactly-once half is YOUR idempotent processing.</div>`,
check:{q:"For 'this message must not be lost' you set…",o:["acks=0","acks=1","acks=all + min.insync.replicas=2","retries=0"],c:2,e:"Wait for at least two in-sync replicas before acking. acks=1 dies with the leader; acks=0 is fire-and-forget."}},
{t:"Offsets: the bookmark problem",h:`<div class="analogy"><b>The bookmark:</b> your consumer's offset marks "processed up to here." Everything hinges on WHEN you move it.</div>
<ul>
<li>Move it <strong>before</strong> finishing the page, then crash → that page is skipped forever. <strong>Lost messages.</strong></li>
<li>Finish, crash <strong>before</strong> moving it → you reread the page. <strong>Duplicates</strong> — survivable, if you're idempotent.</li>
</ul>
<div class="trap"><b>The auto-commit trap:</b> the default commits the bookmark on a <em>timer</em>, oblivious to whether you actually finished — which enables the dangerous first case. For correctness: manual commit, AFTER processing. Prefer duplicates over loss, then neutralize duplicates with idempotency.</div>
<p><strong>Rebalancing:</strong> a consumer joins, leaves, or crashes → partitions get reassigned across the group. And if processing one batch exceeds <code class="inline">max.poll.interval.ms</code>, Kafka assumes you died, kicks you out — triggering another rebalance. Slow consumers cause <em>rebalance storms</em>. Cooperative rebalancing (modern default) moves only affected partitions instead of stopping the world.</p>
<p><strong>Consumer lag</strong> — latest offset minus your committed offset — is the #1 Kafka production metric. Lag growing = you're falling behind reality.</p>`,
check:{q:"Auto-commit can LOSE messages because…",o:["Brokers expire data","The bookmark can move BEFORE processing finishes; a crash then skips those messages forever","Compression corrupts them","Consumers share offsets"],c:1,e:"Timer-based commit doesn't know if you finished. Commit-then-crash = silent loss. Manual commit after processing converts loss into (survivable) duplicates."}},
{t:"Why Kafka is fast + failure patterns",h:`<p><strong>The speed tricks:</strong> Kafka only ever appends to the end of a file (sequential disk I/O is nearly RAM-fast), uses <strong>zero-copy</strong> (data flows page cache → network card without entering user space), batches + compresses aggressively, and leans on the OS page cache instead of JVM heap.</p>
<p><strong>The three failure patterns to own:</strong></p>
<ul>
<li><strong>Poison message</strong> — one event that always crashes the consumer. Never retry in place forever: it blocks every message behind it in the lane. Route to retry topics with backoff, then a <strong>dead-letter queue</strong> after N attempts for a human to inspect.</li>
<li><strong>Hot partition</strong> — one celebrity key floods one lane while others idle. Salt the key (user123-1 … user123-N) to spread load; merge downstream. No amount of "scaling" fixes a key-design problem.</li>
<li><strong>Replay</strong> — the superpower: messages are retained, not deleted, so you can rewind the bookmark and reprocess history. New consumer group, offset to earliest, rebuild a whole projection from scratch. Queues can't do this.</li>
</ul>
<div class="win"><b>Kafka vs RabbitMQ in one breath:</b> Kafka = retained, replayable, ordered-per-partition log that many teams read independently (event streams, audit). RabbitMQ = smart-routing post office that deletes on delivery (task queues).</div>`,
check:{q:"A message that always crashes your consumer should be…",o:["Retried in place forever","Deleted from the broker","Routed to retry topics, then a dead-letter queue","Ignored silently"],c:2,e:"In-place infinite retry blocks the whole partition behind it. Retry with backoff elsewhere, then park in a DLQ for inspection."}}],
bossQ:[
{q:"Per-user event ordering AND horizontal scale. Your design:",o:["One partition for everything","Key by userId — per-user order within a partition, users parallelize across partitions","Random keys + timestamps","Global lock service"],c:1,e:"The key IS the design. One user, one lane, in order; thousands of users spread across lanes in parallel."},
{q:"Consumer lag climbing steadily. Your ordered playbook:",o:["Add partitions immediately","Diagnose per-message vs volume → batch the expensive work → parallelize carefully → scale consumers to partition count → only then add partitions","Restart brokers","Raise max.poll.interval and hope"],c:1,e:"Adding partitions is LAST (it reshuffles key mapping). Most lag is a slow-processing problem, usually unbatched DB writes."},
{q:"Processing a batch takes longer than max.poll.interval.ms. Kafka…",o:["Waits patiently","Assumes the consumer died, kicks it out, triggers a rebalance — possibly a storm","Raises the limit automatically","Drops the batch"],c:1,e:"The group coordinator ejects silent consumers. Slow consumers cause rebalance storms; fix processing speed or the interval, deliberately."},
{q:"One VIP user's events flood a single partition. The fix:",o:["More partitions","Salt the key (vip-1..vip-N) to spread across lanes, merge downstream","Bigger broker","Drop VIP events"],c:1,e:"Hot partitions are key-design problems. Salting trades a little ordering complexity for spread load."},
{q:"You need to rebuild a corrupted read-model from history. Kafka lets you…",o:["You can't — messages are gone","Rewind offsets (new group from earliest) and replay retained events","Query the broker's SQL","Restore from RabbitMQ"],c:1,e:"Retention + rewindable offsets = replay, the superpower ack-and-delete queues fundamentally lack."}]},

/* ---------------- DOCKER ---------------- */
{id:"docker",icon:"🐳",name:"Docker",desc:"Apartments not houses, lasagna layers, and the exit-137 mystery you'll cause on purpose.",
boss:{name:"The OOM Reaper",emoji:"💀"},
lessons:[
{t:"What a container actually is",h:`<div class="analogy"><b>Apartment vs house:</b> a VM is a standalone house — own foundation, plumbing, electricity (a full guest OS). A container is an <strong>apartment</strong>: private rooms and its own lock, but sharing the building's foundation (the host kernel). Hence millisecond startup and massive density — and slightly weaker isolation, which is why clouds running strangers' code add extra sandboxes (gVisor, Firecracker).</div>
<p>Under the hood, a container is a <strong>normal Linux process</strong> wearing two pieces of kernel machinery:</p>
<ul>
<li><strong>Namespaces</strong> — control what it can <em>see</em>: its own process list, network stack, filesystem view, hostname.</li>
<li><strong>cgroups</strong> — control what it can <em>use</em>: hard caps on CPU and memory.</li>
</ul>
<p>Plus a <strong>union filesystem</strong> (OverlayFS): read-only image layers stacked, with one thin writable layer on top per container. No guest OS anywhere — that's the entire speed and density story.</p>
<div class="win"><b>The composition point:</b> they're not rivals — cloud Kubernetes nodes are VMs running containers. VMs isolate untrusted tenants; containers package and ship applications.</div>`,
check:{q:"Containers achieve isolation via…",o:["A mini hypervisor each","Namespaces (what it sees) + cgroups (what it uses) on a shared kernel","A guest OS per container","Special CPUs"],c:1,e:"Just a process with kernel-enforced blinders and budgets. No guest OS = millisecond startup = the whole point."}},
{t:"Layers: the lasagna & the cache",h:`<div class="analogy"><b>The lasagna:</b> each Dockerfile instruction bakes one layer; layers are frozen and cached. Rebuild only the layers whose ingredients changed — everything below stays cached.</div>
<p>Which means <strong>instruction order is a performance feature</strong>:</p>
<pre>COPY pom.xml .
RUN mvn dependency:go-offline   # huge download — cached until pom.xml changes
COPY src ./src
RUN mvn package                 # only THIS reruns when you edit code</pre>
<p>Dependencies change rarely; code changes constantly. Splitting them means a code edit rebuilds seconds of work, not minutes. This single trick is the biggest containerized-CI speedup in existence.</p>
<div class="trap"><b>The secret-in-a-layer trap:</b> COPY a secret in one instruction and delete it in the next — it still exists in the earlier layer's history, extractable by anyone with the image. Secrets are injected at runtime (env, mounted files, build secrets), never baked.</div>`,
check:{q:"To maximize build-cache hits for a Maven app…",o:["Copy all source first","COPY pom.xml and resolve dependencies BEFORE copying src","Disable caching","One giant RUN"],c:1,e:"Rarely-changing dependency resolution stays cached; only the cheap compile layer reruns per code change."}},
{t:"The production Java Dockerfile",h:`<p>Memorize the shape — every line is an interview point:</p>
<pre>FROM maven:3.9-eclipse-temurin-21 AS build
WORKDIR /app
COPY pom.xml .
RUN mvn dependency:go-offline -B
COPY src ./src
RUN mvn package -DskipTests

FROM eclipse-temurin:21-jre-alpine
RUN addgroup -S app && adduser -S app -G app
USER app
COPY --from=build /app/target/*.jar app.jar
ENTRYPOINT ["java","-XX:MaxRAMPercentage=75","-jar","app.jar"]</pre>
<ul>
<li><strong>Two stages</strong> — stage 1 has Maven + full JDK for building; stage 2 copies ONLY the jar onto a slim JRE. ~800MB → ~200MB, and no compilers ship for attackers to abuse.</li>
<li><strong>Non-root USER</strong> — a compromised app isn't a compromised host.</li>
<li><strong>MaxRAMPercentage=75</strong> — the JVM sizes itself against the <em>container's</em> limit, leaving room for everything that isn't heap (the next lesson's mystery).</li>
</ul>
<p>Round out the security answer: minimal base (alpine/distroless), .dockerignore, pinned versions, image scanning (Trivy) in CI.</p>`,
check:{q:"The point of a multi-stage build:",o:["Faster JVM startup","Ship only the artifact — no build tools, dramatically smaller and safer image","Enable hot reload","Kubernetes requires it"],c:1,e:"Build tools live in stage 1 and never ship. Smaller pulls, smaller attack surface."}},
{t:"Networking, compose & the exit-137 mystery",h:`<p>Containers on the same Docker network find each other <strong>by service name</strong> — your app literally connects to <code class="inline">postgres:5432</code> and Docker's embedded DNS resolves it. <code class="inline">-p 8080:8080</code> opens a door from the host into the container.</p>
<p><strong>Compose</strong> = the whole dev stack (app + Postgres + Kafka) declared in one file, started with <code class="inline">docker compose up</code>. It's the honest answer to "how do you run Kafka locally?"</p>
<div class="trap"><b>The 137 mystery — a story worth an offer:</b> your Java container dies with exit code 137. No stack trace. Heap dumps look healthy. What happened? <strong>137 = 128 + signal 9: the KERNEL killed it</strong> for exceeding the cgroup memory limit. Container memory = heap <em>+ metaspace + thread stacks + native buffers</em>. If -Xmx equals the container limit, the extras push you over — and Java never gets to throw OutOfMemoryError, hence the silence. Fix: MaxRAMPercentage≈75, and check direct ByteBuffer usage. Bonus: ancient JVMs read the HOST's memory, not the cgroup limit — modern JVMs are container-aware.</div>
<p>Debug kit: <code class="inline">docker logs -f</code>, <code class="inline">docker exec -it &lt;c&gt; sh</code>, <code class="inline">docker inspect</code> (look for <code class="inline">"OOMKilled": true</code>).</p>`,
check:{q:"Exit code 137 with no Java stack trace means…",o:["NullPointerException","The kernel OOM-killed the container (128+9) before Java could throw anything","Port conflict","Disk full"],c:1,e:"The cgroup cap was breached by heap + stacks + metaspace + native memory combined. The kernel doesn't ask; it kills."}}],
bossQ:[
{q:"-Xmx equals the container's memory limit. The likely outcome under load:",o:["Perfect utilization","OOMKill (137): heap + stacks + metaspace + native exceed the cgroup cap","Faster GC","Nothing"],c:1,e:"Heap is only part of a JVM's footprint. MaxRAMPercentage≈75 or Xmx well below the limit."},
{q:"Your image is 900MB and ships Maven. The fix:",o:["Bigger registry","Multi-stage build: compile in stage 1, ship only the jar on a JRE base","Compress harder","Remove the JRE"],c:1,e:"Build tools never belong in a shipped image — size, pull time, and attack surface all shrink."},
{q:"A 'deleted' secret from an earlier COPY layer is…",o:["Gone forever","Still extractable from layer history — layers are immutable","Encrypted automatically","Only visible to root"],c:1,e:"Later layers mask, not erase. Secrets are injected at runtime, never baked into any layer."},
{q:"App container can't reach the database container in compose. First check:",o:["Host firewall","Is it using the SERVICE NAME (db:5432) and are both on the same compose network?","Reinstall Docker","Use the host's IP"],c:1,e:"Compose networking = DNS by service name. localhost inside a container is the container itself — top-3 beginner trap."},
{q:"Container vs VM, the crisp version:",o:["Same thing, different name","Container = isolated process on a shared kernel (fast, dense); VM = full guest OS on virtual hardware (stronger isolation)","Containers are small VMs","VMs are deprecated"],c:1,e:"And they compose: cloud K8s nodes are VMs running containers. VMs isolate tenants; containers ship apps."}]},

/* ---------------- KUBERNETES ---------------- */
{id:"k8s",icon:"☸️",name:"Kubernetes",desc:"It's a thermostat, not a script — plus the probe disaster you'll cause on purpose and the zero-downtime recipe.",
boss:{name:"The CrashLoop Hydra",emoji:"🐉"},
lessons:[
{t:"The one idea: the thermostat",h:`<div class="analogy"><b>The thermostat:</b> you don't tell it "run the heater 12 minutes" — you say "keep it at 24°C" and it forever adjusts reality to match. Kubernetes is exactly that: you declare <strong>desired state</strong> ("3 replicas of this image with this much memory") and controllers run <strong>reconciliation loops</strong> pushing actual state toward it. A pod dies → the loop sees 2 ≠ 3 → starts a replacement. Every K8s feature is this loop in a different costume.</div>
<p>The cast:</p>
<ul>
<li><strong>API server</strong> — the single front door; everything (kubectl, controllers, kubelets) talks through it.</li>
<li><strong>etcd</strong> — the notebook where desired state is stored.</li>
<li><strong>Scheduler</strong> — decides which node each pod lands on (resources, affinity).</li>
<li><strong>kubelet</strong> — on every node; actually pulls images and starts containers.</li>
</ul>
<p>The deploy flow: <code class="inline">kubectl apply</code> → API server validates and writes to etcd → controllers notice the gap → scheduler places pods → kubelets start them. Declarative in, reconciled out.</p>`,
check:{q:"The core Kubernetes mechanism is…",o:["Running deploy scripts in order","Reconciliation loops driving actual state toward declared desired state, forever","Cron scheduling","Master-slave replication"],c:1,e:"Self-healing is just the loop noticing a mismatch and fixing it. Nothing 'restarts' your pod — the thermostat does."}},
{t:"The objects you actually touch",h:`<ul>
<li><strong>Pod</strong> — smallest unit: one or more containers sharing a network. Cattle, not pets — pods die and get replaced, so you never create them bare.</li>
<li><strong>Deployment → ReplicaSet → Pods</strong> — "keep N replicas, update them gradually," with rollback history built in.</li>
<li><strong>Service</strong> — the stable phone number: pods come and go with new IPs; the Service's fixed name/IP routes to whoever currently wears the matching <strong>label</strong>. Selector-matches-label is the whole trick.</li>
<li><strong>Ingress</strong> — the receptionist at the building entrance: hostname/path rules → Services, plus TLS termination. One cloud load balancer for the whole cluster.</li>
<li><strong>ConfigMap / Secret</strong> — injected configuration. <em>Secrets are base64-encoded, NOT encrypted by default</em> — a costume, not a lock. Real protection: encryption at rest, RBAC, or an external vault.</li>
<li><strong>HPA</strong> — autoscaling on CPU or custom metrics (Kafka lag via KEDA is the classic backend example).</li>
<li><strong>StatefulSet</strong> — stable identity + per-pod storage, for databases and brokers.</li>
</ul>
<div class="win"><b>Say it like a senior:</b> "Same image in every environment — only the injected ConfigMap/Secret differs. If the image changes between staging and prod, you're testing something you're not shipping."</div>`,
check:{q:"Kubernetes Secrets, by default, are…",o:["AES-encrypted","Base64-encoded only — decodable by anyone with access","Stored outside etcd","Auto-rotated"],c:1,e:"base64 is encoding, not encryption. Enable etcd encryption at rest, lock down RBAC, or use an external vault."}},
{t:"Probes — THE backend question",h:`<p>Kubernetes keeps asking your app two very different questions:</p>
<ul>
<li><strong>Liveness</strong>: "are you alive or deadlocked?" Fail → the container is <strong>restarted</strong>. Keep this check dumb — process responds, nothing more.</li>
<li><strong>Readiness</strong>: "can you take traffic right now?" Fail → the pod is quietly <strong>removed from the Service's endpoints</strong> (NOT restarted) until it recovers.</li>
<li><strong>Startup</strong>: a grace period for slow starters (large Spring apps) so liveness doesn't kill them mid-boot.</li>
</ul>
<div class="trap"><b>The classic disaster (cause it on purpose in a sandbox once):</b> put a database check in the <em>liveness</em> probe. The DB blips for 10 seconds → every pod "fails liveness" simultaneously → Kubernetes restarts the ENTIRE fleet → everything is rebooting while the DB recovers, then the thundering herd of restarts hits the poor database again. Dependency checks belong in <strong>readiness</strong>, never liveness.</div>
<p>Spring Actuator ships <code class="inline">/actuator/health/liveness</code> and <code class="inline">/readiness</code> for exactly this split — mentioning it unprompted is free credibility.</p>`,
check:{q:"A pod failing its READINESS probe is…",o:["Restarted","Quietly removed from the load balancer until it recovers","Deleted permanently","Moved to another node"],c:1,e:"Readiness gates traffic; liveness triggers restarts. Confusing them — or checking the DB in liveness — is how whole fleets reboot together."}},
{t:"Zero-downtime deploys, requests & limits",h:`<p><strong>The zero-downtime recipe has two halves:</strong></p>
<p><em>Bringing pods up:</em> a rolling update creates new-version pods and readiness probes gate their traffic — no requests until the pod says ready — while old pods scale down (maxSurge / maxUnavailable control the pace). Rollback is one command: <code class="inline">kubectl rollout undo</code>.</p>
<p><em>Taking pods down (where everyone gets burned):</em> a dying pod gets SIGTERM, but its removal from the Service's endpoints propagates with a small delay — requests can still arrive at a pod that's shutting down. Fix: a few-second <code class="inline">preStop</code> sleep + graceful shutdown in the app (Spring: <code class="inline">server.shutdown=graceful</code> — stop accepting, drain in-flight). Miss either half and every deploy sprays 502s.</p>
<p><strong>Requests vs limits:</strong> <em>requests</em> = "reserve me this much" (what the scheduler uses); <em>limits</em> = the hard cgroup cap. At the cap the two resources behave differently:</p>
<ul>
<li><strong>CPU over limit → throttled</strong> (slowed, not killed). For Java this manifests as mysterious GC pauses and latency — a very senior thing to mention.</li>
<li><strong>Memory over limit → OOMKilled</strong> — our old friend, exit 137.</li>
</ul>
<p><strong>CrashLoopBackOff debug order:</strong> <code class="inline">kubectl describe pod</code> (events: image pull? OOMKilled? probe fails?) → <code class="inline">kubectl logs --previous</code> (why the LAST run died) → usual suspects: bad config/secret reference, startup dependency failing, memory limit too small, liveness probe more impatient than boot time.</p>`,
check:{q:"CPU over the limit vs memory over the limit:",o:["Killed / throttled","Throttled / OOMKilled","Both killed","Both throttled"],c:1,e:"CPU is compressible — the kernel rations it (hello, mystery JVM latency). Memory isn't — the kernel kills (137)."}}],
bossQ:[
{q:"DB blips 10 seconds and your ENTIRE fleet restarts simultaneously. Root cause:",o:["Kubernetes bug","A database check inside the LIVENESS probe — dependency checks belong in readiness","Too few replicas","Network partition"],c:1,e:"Liveness failure = restart. Every pod 'failed' together because the check tested the DB, not the app. The classic."},
{q:"Every deploy throws a few 502s. The missing piece:",o:["More replicas","Graceful shutdown + preStop sleep — endpoint removal propagates with delay while the pod is dying","Bigger nodes","Blue-green only"],c:1,e:"The shutdown half of zero-downtime: stop accepting, drain in-flight, and wait out the endpoint propagation before dying."},
{q:"CrashLoopBackOff. Your first TWO commands:",o:["delete pod, then apply again","kubectl describe pod (events), then kubectl logs --previous (why the last run died)","Restart the node","Scale to zero and back"],c:1,e:"Events name the category (OOMKilled, probe, image pull); --previous shows the dead run's logs since the current one hasn't crashed yet."},
{q:"Java service has mysterious latency spikes; memory is fine. A K8s-specific suspect:",o:["etcd is slow","CPU throttling at the limit — the kernel rations CPU, stretching GC pauses","DNS caching","Too many labels"],c:1,e:"CPU limits throttle rather than kill. JVMs under throttling exhibit exactly this: fine, fine, mysteriously slow."},
{q:"A Service routes traffic to pods via…",o:["Pod IP lists updated manually","Label selectors — it targets any pod wearing the matching label","SSH tunnels","The Ingress controller"],c:1,e:"Selector-matches-label is the whole trick. The Service never knows pods by name — only by the tag they wear."}]},

/* ---------------- RAG & LLMs ---------------- */
{id:"rag",icon:"🧠",name:"RAG & LLMs",desc:"The open-book exam, why chunking beats model choice, and production LLM engineering.",
boss:{name:"The Hallucination Wraith",emoji:"👻"},
lessons:[
{t:"What RAG is & the full pipeline",h:`<div class="analogy"><b>The open-book exam:</b> an LLM alone is a brilliant student in a closed-book exam — huge general knowledge, frozen the day training ended, and it confidently guesses when unsure. <strong>RAG makes it open-book:</strong> before answering, fetch the relevant pages from YOUR documents and let it answer from those — with citations.</div>
<p>The pipeline, end to end:</p>
<ul>
<li><strong>Chunk</strong> — cut documents into pieces (next lesson — it matters most).</li>
<li><strong>Embed</strong> — turn each chunk into a vector: coordinates on a map of meaning, where similar ideas sit close together.</li>
<li><strong>Store</strong> — vectors go in a database built for "find the nearest points."</li>
<li><strong>Retrieve</strong> — at question time, embed the question, find the closest chunks (ANN search over an HNSW index; cosine similarity as the distance).</li>
<li><strong>Generate</strong> — hand the model those chunks + the question: "answer ONLY from this; if it's not here, say so; cite sources."</li>
</ul>
<p><strong>Why not fine-tune instead?</strong> Fine-tuning is slow, expensive, and unreliable at adding <em>facts</em>. With RAG, updating knowledge = re-indexing a document (minutes), and you get citations plus per-user access control at retrieval time.</p>
<div class="win"><b>The line that lands:</b> "Fine-tuning teaches the model how to speak; RAG gives it something true to say. They compose — they're not rivals."</div>`,
check:{q:"RAG vs fine-tuning for keeping knowledge current:",o:["Fine-tune weekly","RAG — re-index the documents; fine-tuning is poor at reliably adding facts","Bigger context window","Retrain from scratch"],c:1,e:"Knowledge belongs in the retrieval store where updating is cheap and cited. Fine-tuning is for style, format, and domain voice."}},
{t:"Chunking & the vector store choice",h:`<div class="analogy"><b>How you tear up the book:</b> tear pieces too big and each is about ten things at once — its map coordinate lands in a blurry average and retrieval fetches mush. Too small and a piece says "it increased by 40%" with no clue what <em>it</em> is.</div>
<p>Sane defaults: <strong>300–800 tokens with 10–20% overlap</strong> so edge sentences keep context. Better: split along the document's own structure — headings, sections — and never cut a table in half. This is the highest-leverage dial in the entire pipeline: bad chunking cannot be fixed downstream by a better model.</p>
<p><strong>pgvector vs dedicated stores</strong> — the decision worth defending in interviews:</p>
<ul>
<li><strong>pgvector</strong> (a Postgres extension): vectors live NEXT TO your relational data — one transaction covers a document's metadata and its embeddings, and you can <strong>JOIN</strong> similarity results against user/permission tables for access control. Zero extra infrastructure. HNSW indexing included. Ideal at small-to-mid scale.</li>
<li><strong>Dedicated</strong> (Pinecone, Qdrant, Weaviate): earn their cost at tens of millions of vectors and high QPS, where index memory and build times outgrow Postgres.</li>
</ul>
<div class="win"><b>The answer shape seniors use:</b> a scale-appropriate choice with a stated revisit point — "pgvector now, because transactional consistency and JOINs; at ~10M+ vectors I'd re-evaluate."</div>`,
check:{q:"The highest-leverage decision in a RAG pipeline is usually…",o:["Temperature","Chunking strategy","HTTP framework","GPU type"],c:1,e:"Chunk boundaries define what each embedding 'means' and what the model gets to read. No downstream component can repair mush."}},
{t:"Demo RAG vs production RAG",h:`<p>A weekend demo retrieves top-5 and prays. Production adds four layers:</p>
<ul>
<li><strong>Hybrid search</strong> — vectors understand meaning but fumble exact identifiers: "SUN-14842" has no semantic neighborhood. Run keyword search (BM25) alongside and merge the ranked lists (Reciprocal Rank Fusion).</li>
<li><strong>Reranking</strong> — retrieve 50 candidates cheaply with vector search, then let a cross-encoder re-sort to the best 5. Fast net, careful hands.</li>
<li><strong>Query rewriting</strong> — turn "and what about last year?" into a self-contained question before embedding it.</li>
<li><strong>Evaluation</strong> — THE interview question is "how do you know it's good?" The only right answer: a labeled test set. Measure retrieval (<strong>recall@k</strong> — did the right chunk make the top-k?) and generation (<strong>faithfulness</strong> — did the answer stick to the retrieved text?). Never "it looked fine when I tried it."</li>
</ul>
<div class="win"><b>The debugging discipline (use it verbatim):</b> a wrong answer splits into two questions. Was the correct chunk retrieved at all? No → retrieval problem (chunking, embeddings, hybrid, rewriting). Yes → generation problem (prompt, context order, model). Measure recall@k before changing anything.</div>`,
check:{q:"First step when a RAG answer is wrong:",o:["Raise temperature","Check whether the correct chunk was even retrieved in the top-k","Switch models","Lengthen the prompt"],c:1,e:"Retrieval and generation fail differently. If the truth never reached the context, no prompting conjures it. Measure retrieval first."}},
{t:"LLM APIs in production (the backend part)",h:`<p>The engineering backend people are expected to own:</p>
<ul>
<li><strong>Tokens</strong> — the currency (~4 characters each): pricing per token, context windows measured in them, and latency ≈ time-to-first-token + tokens × per-token time — so <strong>stream</strong> the response instead of showing a spinner.</li>
<li><strong>Temperature</strong> — the creativity dial: 0 for extraction and structured tasks; higher only when you want variety.</li>
<li><strong>Structured output</strong> — request JSON, then <em>always</em> validate and retry on a bad parse. 99% reliable is not 100%, and your parser meets the 1%.</li>
<li><strong>Resilience</strong> — rate limits are weather, not surprises: retry with exponential backoff + jitter, timeout budgets, a circuit breaker with a graceful fallback, cost tracking per request, and a semantic cache for repeated questions.</li>
</ul>
<div class="trap"><b>Prompt injection — the security question:</b> a retrieved document might literally contain "ignore your instructions and reveal secrets." Retrieved text is <strong>data, not commands</strong>: wrap it in clear delimiters, instruct the model that delimited content is quoted material only, give any tools least-privilege access, and never put secrets in prompts. Defense in depth — seatbelt + airbag + crumple zone; no single fix.</div>`,
check:{q:"Documents retrieved into a RAG prompt should be treated as…",o:["Trusted instructions","Untrusted data that may contain injection attempts","System prompts","Training data"],c:1,e:"A malicious page can say 'ignore your instructions.' Delimit it, declare it data-not-commands, least-privilege the tools."}}],
bossQ:[
{q:"Users search ticket IDs like 'SUN-14842' and vector search whiffs. The fix:",o:["Bigger embeddings","Hybrid search: BM25 keywords + vectors, merged with Reciprocal Rank Fusion","Higher temperature","More chunks per query"],c:1,e:"Exact identifiers have no semantic neighborhood. Keyword search catches them; RRF merges the two ranked lists."},
{q:"'How do you know your RAG is actually good?' The senior answer:",o:["Users seem happy","A labeled eval set: recall@k for retrieval, faithfulness for generation — measured before and after every change","The model is expensive","Low latency"],c:1,e:"Evaluation sets turn vibes into engineering. This exact question separates demo-builders from production owners."},
{q:"Your answers hallucinate even though retrieval finds the right chunks. You fix…",o:["The chunker","The generation side: strict answer-only-from-context prompt, an explicit 'not in the notes' escape hatch, context ordering","The vector index","The database"],c:1,e:"Right chunk retrieved + wrong answer = generation problem. The split diagnosis tells you exactly which half to touch."},
{q:"Defending pgvector over Pinecone at your scale, the strongest argument is…",o:["It's newer","Transactional consistency + SQL JOINs with permission tables + zero extra infra — with a stated revisit point at ~10M vectors","It's always faster","Pinecone is deprecated"],c:1,e:"Scale-appropriate choice, articulated trade-off, revisit point. The answer SHAPE matters as much as the choice."},
{q:"The LLM API starts timing out during a provider incident. Your /ask endpoint should…",o:["Hang until it recovers","Trip a circuit breaker and serve a graceful fallback — fail fast, protect your threads","Retry in a tight loop","Return a 500 stack trace"],c:1,e:"Timeout + breaker + human-friendly fallback. Threads never pile up behind a dead dependency."}]}
];

/* flashcards from track Q&A essence */
const FLASH=[
{t:"Java",q:"Why is String immutable?",a:"Security (paths can't change after validation), free thread-safety, cached hashCode (perfect HashMap key), and safe string-pool sharing."},
{t:"Java",q:"volatile vs AtomicInteger for a counter?",a:"volatile gives visibility only — count++ is three interleavable steps. AtomicInteger uses CAS for true atomic increments."},
{t:"Java",q:"What is virtual-thread 'pinning'?",a:"Blocking inside a synchronized block sticks the virtual thread to its carrier, defeating the scalability win. Use ReentrantLock in hot blocking paths."},
{t:"Spring",q:"Why does self-invocation break @Transactional?",a:"The transaction lives in the AOP proxy around the bean. this.method() takes the internal corridor, never crossing the proxy. Extract to another bean."},
{t:"Spring",q:"@Component vs @Bean?",a:"@Component: class-level, scanned, for classes you own. @Bean: method in @Configuration, for third-party classes or construction logic."},
