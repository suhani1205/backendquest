{t:"Spring",q:"Walk through a request in one breath.",a:"Tomcat → DispatcherServlet → HandlerMapping → Jackson deserializes + validation → method runs → MessageConverter serializes → filters wrap it all → exceptions hit @ControllerAdvice."},
{t:"Microservices",q:"Exactly-once payment processing — possible?",a:"Exactly-once DELIVERY is impossible. Build effectively-once: Idempotency-Key + unique constraint, outbox for events, consumer dedup on event ID."},
{t:"Microservices",q:"Choreography vs orchestration?",a:"Choreography: services react to events, no coordinator — simple flows. Orchestration: a coordinator tracks state — 4+ steps or complex compensation."},
{t:"Microservices",q:"What problem does the outbox pattern kill?",a:"Dual-write: DB committed but event publish failed. Row + event in ONE local transaction; a relay publishes from the outbox table."},
{t:"Kafka",q:"How do you get ordering AND scale?",a:"Key by entity (userId/orderId): per-entity order within one partition, entities parallelized across partitions. Then push back on 'global ordering' — it's almost never a real requirement."},
{t:"Kafka",q:"How can auto-commit LOSE messages?",a:"It commits on a timer — possibly before processing finishes. Crash then = skipped forever. Manual commit after processing converts loss into survivable duplicates."},
{t:"Kafka",q:"Poison message playbook?",a:"Never retry in place (blocks the partition). Retry topics with backoff → dead-letter queue after N attempts → human inspects the DLQ."},
{t:"Docker",q:"Exit 137, healthy heap — explain.",a:"Kernel OOMKill: heap + metaspace + stacks + native buffers breached the cgroup cap. Java never got to throw. Fix: MaxRAMPercentage≈75."},
{t:"Docker",q:"Why does COPY pom.xml come before COPY src?",a:"Layer caching: dependencies change rarely, code changes constantly. Splitting them means code edits rebuild seconds, not minutes."},
{t:"Docker",q:"Container vs VM in one line?",a:"Container = isolated process on a shared kernel (namespaces + cgroups, millisecond starts). VM = full guest OS on virtual hardware (stronger isolation). K8s nodes are VMs running containers."},
{t:"Kubernetes",q:"Liveness vs readiness — and the classic disaster?",a:"Liveness fail = restart; readiness fail = removed from traffic. DB check in liveness → DB blip restarts the whole fleet. Dependencies go in readiness only."},
{t:"Kubernetes",q:"The zero-downtime recipe?",a:"Up: rolling update gated by readiness. Down: SIGTERM + preStop sleep + graceful shutdown, because endpoint removal propagates with delay."},
{t:"Kubernetes",q:"CPU limit vs memory limit breach?",a:"CPU → throttled (mystery JVM latency, stretched GC). Memory → OOMKilled, exit 137."},
{t:"RAG",q:"RAG vs fine-tuning?",a:"Fine-tuning teaches HOW to speak (style, format); RAG gives something TRUE to say (facts, freshness, citations, access control). They compose."},
{t:"RAG",q:"Debug a wrong RAG answer?",a:"Split it: was the right chunk retrieved? No → retrieval (chunking, embeddings, hybrid). Yes → generation (prompt, ordering). Measure recall@k on a labeled set first."},
{t:"RAG",q:"Prompt injection defense?",a:"Retrieved text is data, not commands: strict delimiters, 'quoted material only' instruction, least-privilege tools, no secrets in prompts. Defense in depth."}
];

function trackProgress(t){
  const total=t.lessons.length;
  let done=0;t.lessons.forEach((_,i)=>{if(S.lessons[t.id+'-'+i])done++});
  return {done,total,boss:!!S.boss[t.id]};
}

function render(){
  if(view.name==='home')return renderHome();
  if(view.name==='track')return renderTrack(view.a);
  if(view.name==='lesson')return renderLesson(view.a,view.b);
  if(view.name==='boss')return renderBoss(view.a);
  if(view.name==='flash')return renderFlash();
}

function renderHome(){
  const lvl=levelOf(S.xp),nxt=nextLevel(S.xp);
  const pct=nxt?Math.round((S.xp-lvl[0])/(nxt[0]-lvl[0])*100):100;
  let cards='';
  TR.forEach(t=>{
    const p=trackProgress(t);
    const tpct=Math.round((p.done+(p.boss?1:0))/(p.total+1)*100);
    cards+=`<button class="tcard" onclick="go('track','${t.id}')">
      <div class="icon">${t.icon}</div><h3>${t.name}</h3><p>${t.desc}</p>
      <div class="minibar"><i style="width:${tpct}%"></i></div>
      <div class="meta"><span>${p.done}/${p.total} lessons</span><span class="${p.boss?'done':''}">${p.boss?'👑 boss defeated':'boss awaits'}</span></div>
    </button>`;
  });
  main.innerHTML=`
  <div class="hero">
    <h1>Level up to <span>Senior</span>,<br>one quest at a time.</h1>
    <p>Seven tracks. Every lesson ends in a quick-check. Every track ends in a boss battle. XP for everything — because knowledge that isn't tested isn't knowledge yet.</p>
    <div class="lvlbar">
      <div class="row"><span>LEVEL: <b>${lvl[1]}</b></span><span>${nxt?S.xp+' / '+nxt[0]+' XP → '+nxt[1]:'MAX LEVEL 🏆'}</span></div>
      <div class="bar"><i style="width:${pct}%"></i></div>
    </div>
  </div>
  <div class="sec">Quest tracks</div>
  <div class="grid">${cards}</div>
  <div class="sec">Revision arena</div>
  <div class="grid">
    <button class="tcard revcard" onclick="go('flash')">
      <div class="icon">⚡</div><h3>Rapid-Fire Flashcards</h3>
      <p>${FLASH.length} senior-interview questions. Answer out loud, flip, self-judge. The 'again' pile haunts you until it's gone.</p>
      <div class="meta"><span>best revision 20 min before an interview</span></div>
    </button>
  </div>`;
  paintHud();
}

function renderTrack(tid){
  const t=TR.find(x=>x.id===tid);
  const p=trackProgress(t);
  let rows='';
  t.lessons.forEach((L,i)=>{
    const done=!!S.lessons[t.id+'-'+i];
    rows+=`<button class="lesson-row ${done?'done':''}" onclick="go('lesson','${t.id}',${i})">
      <span class="num">${String(i+1).padStart(2,'0')}</span>
      <span class="lt">${L.t}</span>
      <span class="st">${done?'✓ done':'+25 XP'}</span>
    </button>`;
  });
  main.innerHTML=`
    <button class="back" onclick="go('home')">← all tracks</button>
    <div class="track-head"><div class="icon">${t.icon}</div><h2>${t.name}</h2></div>
    <p class="track-desc">${t.desc}</p>
    <div class="sec">Lessons</div>${rows}
    <button class="bossbtn ${p.boss?'defeated':''}" onclick="go('boss','${t.id}')">
      ${t.boss.emoji} Boss Battle: ${t.boss.name} ${p.boss?'— DEFEATED 👑 (rematch?)':''}
      <small>${t.bossQ.length} questions · +20 XP each · defeat = +50 bonus${p.done<p.total?' · tip: finish the lessons first':''}</small>
    </button>`;
  paintHud();
}

function renderLesson(tid,li){
  const t=TR.find(x=>x.id===tid);
  const L=t.lessons[li];
  const key=tid+'-'+li;
  const ckey='c-'+key;
  main.innerHTML=`
    <button class="back" onclick="go('track','${tid}')">← ${t.name}</button>
    <article>
      <div class="crumb">${t.icon} ${t.name} · lesson ${li+1} of ${t.lessons.length}</div>
      <h2>${L.t}</h2>
      ${L.h}
      <div class="check" id="check">
        <div class="tag">⚡ Quick check — lock it in</div>
        <div class="q">${L.check.q}</div>
        <div id="opts"></div>
        <div class="explain" id="explain"></div>
      </div>
      <div class="navrow">
        <button class="btn ghost" onclick="go('track','${tid}')">Back</button>
        <button class="btn" id="nextBtn" disabled>${li<t.lessons.length-1?'Next lesson →':'To the boss →'}</button>
      </div>
    </article>`;
  const opts=document.getElementById('opts');
  const nextBtn=document.getElementById('nextBtn');
  const already=!!S.checks[ckey];
  L.check.o.forEach((o,i)=>{
    const b=document.createElement('button');b.className='opt';b.textContent=o;
    if(already&&i===L.check.c)b.classList.add('correct');
    if(already)b.disabled=true;
    b.onclick=()=>{
      [...opts.children].forEach(x=>x.disabled=true);
      const ex=document.getElementById('explain');
      ex.innerHTML='<strong>Why:</strong> '+L.check.e;ex.classList.add('shown');
      if(i===L.check.c){
        b.classList.add('correct');
        if(!S.checks[ckey]){S.checks[ckey]=1;addXP(10,'quick check')}
      }else{
        b.classList.add('wrong');opts.children[L.check.c].classList.add('correct');
      }
      completeLesson();
    };
    opts.appendChild(b);
  });
  if(already){document.getElementById('explain').innerHTML='<strong>Why:</strong> '+L.check.e;document.getElementById('explain').classList.add('shown');nextBtn.disabled=false}
  function completeLesson(){
    if(!S.lessons[key]){S.lessons[key]=1;addXP(25,'lesson complete')}
    safeSave();nextBtn.disabled=false;
  }
  nextBtn.onclick=()=>{li<t.lessons.length-1?go('lesson',tid,li+1):go('boss',tid)};
  paintHud();
}

function renderBoss(tid){
  const t=TR.find(x=>x.id===tid);
  const total=t.bossQ.length;
  let idx=0,hp=total,score=0;
  main.innerHTML=`
    <button class="back" onclick="go('track','${tid}')">← retreat</button>
    <div class="boss-arena" id="arena"></div>`;
  const arena=document.getElementById('arena');
  function frame(){
    if(hp<=0){
      const first=!S.boss[tid];
      if(first){S.boss[tid]=1;safeSave();addXP(50,'BOSS DEFEATED')}
      burst();
      arena.innerHTML=`<div class="victory">
        <div class="big">👑</div>
        <h3>${t.boss.name} defeated!</h3>
        <p>${score}/${total} correct${first?' · +50 XP bonus banked':' · rematch honor: intact'}</p>
        <div class="navrow" style="justify-content:center">
          <button class="btn mint" onclick="go('home')">Back to quests</button>
          <button class="btn ghost" onclick="go('flash')">⚡ Rapid-fire revision</button>
        </div></div>`;
      return;
    }
    if(idx>=total){
      arena.innerHTML=`<div class="victory">
        <div class="big">💤</div>
        <h3>The boss survives…</h3>
        <p>${score}/${total} — reread the lessons that got you, then rematch. Bosses respect preparation.</p>
        <div class="navrow" style="justify-content:center">
          <button class="btn" onclick="go('boss','${tid}')">Rematch</button>
          <button class="btn ghost" onclick="go('track','${tid}')">Back to lessons</button>
        </div></div>`;
      return;
    }
    const q=t.bossQ[idx];
    arena.innerHTML=`
      <div class="boss-top"><div class="boss-emoji" id="bem">${t.boss.emoji}</div>
        <div style="flex:1"><div class="boss-name">${t.boss.name}</div>
        <div class="hp"><i style="width:${hp/total*100}%"></i></div>
        <div class="hp-label">HP ${hp}/${total} · question ${idx+1}/${total} · each correct hit: −1 HP, +20 XP</div></div></div>
      <div class="check" style="margin-top:8px">
        <div class="q">${q.q}</div><div id="bopts"></div>
        <div class="explain" id="bex"></div>
        <div class="navrow"><span></span><button class="btn" id="bnext" style="visibility:hidden">Next →</button></div>
      </div>`;
    const opts=document.getElementById('bopts');
    q.o.forEach((o,i)=>{
      const b=document.createElement('button');b.className='opt';b.textContent=o;
      b.onclick=()=>{
        [...opts.children].forEach(x=>x.disabled=true);
        const ex=document.getElementById('bex');
        ex.innerHTML='<strong>Why:</strong> '+q.e;ex.classList.add('shown');
        if(i===q.c){
          b.classList.add('correct');hp--;score++;
          document.getElementById('bem').classList.add('shake');
          addXP(20,'critical hit');
          arena.querySelector('.hp>i').style.width=(hp/total*100)+'%';
        }else{
          b.classList.add('wrong');opts.children[q.c].classList.add('correct');
        }
        document.getElementById('bnext').style.visibility='visible';
      };
      opts.appendChild(b);
    });
    document.getElementById('bnext').onclick=()=>{idx++;frame()};
  }
  frame();
  paintHud();
}

function renderFlash(){
  let deck=FLASH.map((_,i)=>i);
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]]}
  let again=[],pos=0,got=0;
  main.innerHTML=`
    <button class="back" onclick="go('home')">← all tracks</button>
    <div class="track-head"><div class="icon">⚡</div><h2>Rapid-Fire Flashcards</h2></div>
    <p class="track-desc">Answer out loud FIRST — that's the rep that counts. Tap to flip. Be brutally honest with yourself: "again" cards return until you own them.</p>
    <div id="fzone"></div>`;
  const zone=document.getElementById('fzone');
  function draw(){
    if(pos>=deck.length){
      if(again.length){deck=again;again=[];pos=0}
      else{
        burst();
        zone.innerHTML=`<div class="fdone"><div class="big">🏆</div>
          <h3 style="font-family:'Space Grotesk';font-size:24px;margin:10px 0">Deck cleared — ${got} cards owned</h3>
          <p style="color:var(--dim)">That's a full senior-interview sweep. Come back tomorrow: the streak flame is watching. 🔥</p>
          <div class="navrow" style="justify-content:center;margin-top:16px">
            <button class="btn" onclick="go('flash')">Shuffle & go again</button>
            <button class="btn ghost" onclick="go('home')">Home</button>
          </div></div>`;
        return;
      }
    }
    const c=FLASH[deck[pos]];
    zone.innerHTML=`
      <div class="flash-meta"><span>[${c.t}]</span><span>card ${pos+1}/${deck.length}${again.length?' · again pile: '+again.length:''}</span></div>
      <div class="flash-stage"><div class="fcard" id="fc">
        <div class="fface front"><div class="flabel">Question — answer out loud, then tap</div><div class="ftext">${c.q}</div></div>
        <div class="fface back"><div class="flabel">Model answer</div><div class="ftext">${c.a}</div></div>
      </div></div>
      <div class="flash-actions" id="facts" style="visibility:hidden">
        <button class="btn ghost" id="fagain">↻ Again</button>
        <button class="btn mint" id="fgot">✓ Got it (+2 XP)</button>
      </div>`;
    const fc=document.getElementById('fc');
    fc.onclick=()=>{fc.classList.add('flip');document.getElementById('facts').style.visibility='visible'};
    document.getElementById('fagain').onclick=()=>{again.push(deck[pos]);pos++;draw()};
    document.getElementById('fgot').onclick=()=>{got++;addXP(2,'card owned');pos++;draw()};
  }
  draw();
  paintHud();
}

render();
</script>
</body>
</html>
